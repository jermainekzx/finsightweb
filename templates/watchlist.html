<!DOCTYPE html>
<html>
<head>
    <title>FinSight - Watchlist</title>
</head>
<body>
    <nav>
        <a href="/">Home</a> | 
        <a href="/">Search Stocks</a> | 
        <a href="/screener">Screener</a> | 
        <a href="/logout">Log Out</a>
    </nav>
    <h1>Your saved stocks</h1>
    <ul>
        {% for ticker in watchlist %}
        <li>
            <a href="/user/{{ user_id }}/stock/{{ ticker }}">{{ ticker }}</a>
            <form method="post" action="/user/{{ user_id }}/watchlist/remove/{{ ticker }}" style="display:inline;">
                <button type="submit">Remove</button>
            </form>
        </li>
        {# loop through saved tickers #}
        {% endfor %}
    </ul>
    <form method="post" action="/user/{{ user_id }}/watchlist/add">
        <input type="text" name="ticker" placeholder="Enter ticker symbol" required>
        <button type="submit">Add to Watchlist</button>
    </form>
</body>
</html>
