<!DOCTYPE html>
<html>
<head>
    <title>Home | FinSight</title>
</head>
<body>
    <nav>
        <a href="/screener">Screener</a> |
        {% if session.get('user_id') %}
            <a href="/user/{{ session['user_id'] }}/watchlist">My Watchlist</a> | 
            <a href="/logout">Log Out</a>
        {% else %}
            <a href="/login">Login</a> | 
            <a href="/register">Register</a>
        {% endif %}
    </nav>
    <h1>Welcome to FinSight</h1>
    
    <h2>Search for a Stock Symbol</h2>
    <form action="/search" method="POST">
        <input type="text" name="ticker" placeholder="e.g. aapl, d05.si">
        <button type="submit">Search</button>
    </form>
</body>
</html>
