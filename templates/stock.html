<!DOCTYPE html>
<html>
<head>
    <title>{{ ticker }} Stock Information</title>
</head>
<body>
    Logged in as: <strong>{{ user_name }}</strong>
    <hr>
    <h1>{{ ticker }} Stock Information</h1>
    <p>Current Price: ${{ price }}</p>
    <p>Price to Earnings Ratio: {{ pe }}</p>
    <p>Market Cap: {{ market_cap }}</p>
    <p>52 Week High: {{ week_high }}</p>
    <p>52 Week Low: {{ week_low }}</p>
    <p>Risk Assessment: {{ risk_assessment }}</p>
    <form method="POST" action="/user/{{ user_id }}/watchlist/add">
    <button type="submit">Add to Watchlist</button>
    </form>

    <h2>1 Month Price Chart</h2>
    <canvas id="priceChart" width="750" height="350"></canvas>

    <!-- chart.js renders the closing price data from flask as a line graph -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const dates = {{ chart_dates | tojson }};
        const prices = {{ chart_prices | tojson }};

        const ctx = document.getElementById('priceChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: dates,
                datasets: [{
                    label: '{{ ticker }} Closing Price',
                    data: prices,
                    borderColor: '#e63946',
                    fill: false
                }]
            }
        });
    </script>
</body>
</html>
